<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteFlow</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <i class="fa-solid fa-note-sticky"></i><span>NoteFlow</span>
      </div>
      <ul class="nav-links">
        <li class="navlink active">My Notes</li>
        <li class="navlink">Archive</li>
        <li class="navlink">Trash</li>
      </ul>
    </div>

    <div class="nav-right">
      <input type="text" placeholder="Search notes..." class="search">
      <div class="icon">⚙️</div>
      <div class="profile">S</div>
    </div>
  </nav>

  <!-- Main Section -->
  <section class="container">

    <h1>My Notes</h1>
    <p class="subtitle">Organize your thoughts and stay productive.</p>

    <!-- Archive -->
    <div>

    </div>

    <!-- Note Card -->
    <div class="note-card">
      <input type="text" placeholder="Note Title" class="note-title">
      <textarea class="note-text" placeholder="Start typing your note here..."></textarea>

      <div class="note-footer">
        <div class="icons">
          <i class="fa-solid fa-plus"></i>
          <i class="fa-solid fa-paperclip"></i>
          <i class="fa-regular fa-square-check"></i>
        </div>
        <button class="add-btn">+ Add Note</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <span class="tab active">All Notes</span>
      <span class="tab">Work</span>
      <span class="tab">Personal</span>
    </div>

    <!-- note area -->
    <div class="content">

    </div>
  </section>
  <script src="script.js"></script>
</body>

</html>
